{% extends "layout.html" %}
{% block title %}Login — LibraryApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-0 mt-4">
      <div class="card-body p-4">
        <h4 class="card-title mb-1 fw-bold text-dark">Sign In</h4>
        <p class="text-muted mb-4 small">Access your library account</p>

        <form id="loginForm" method="post" action="{% url 'library:login' %}" novalidate>
          {% csrf_token %}

          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control" id="email" name="email"
                   value="{{ email|default:'' }}" placeholder="you@example.com" required autofocus/>
            <div class="invalid-feedback">Please enter a valid email address.</div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="••••••••" required/>
              <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <div class="invalid-feedback">Password is required.</div>
          </div>

          <button type="submit" class="btn btn-dark w-100" id="loginBtn">
            <i class="fa-solid fa-right-to-bracket me-1"></i> Sign In
          </button>
        </form>

        <hr/>
        <p class="text-center small mb-0">
          No account? <a href="{% url 'library:register' %}" class="text-decoration-none fw-semibold">Register</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
