{% extends "layout.html" %}
{% block title %}Add Category — LibraryApp{% endblock %}

{% block content %}
<div class="page" style="max-width:480px">

  <nav style="font-size:.85rem;color:var(--text-muted);margin-bottom:1.5rem">
    <a href="{% url 'library:admin_book_list' %}" style="color:var(--navy)">Books</a>
    <span style="margin:0 .4rem">/</span> Add Category
  </nav>

  <h1 style="color:var(--navy);margin-bottom:1.8rem">
    <i class="fa-solid fa-tag"></i> Add Category
  </h1>

  <div class="card" style="padding:2rem">
    <form method="post" action="{% url 'library:admin_category_create' %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="name">Category name *</label>
        <input class="form-input" type="text" id="name" name="name"
               placeholder="e.g. Science Fiction" required autofocus />
      </div>
      <hr class="divider" />
      <div style="display:flex;gap:.75rem;justify-content:flex-end">
        <a href="{% url 'library:admin_book_list' %}" class="btn btn--ghost">Cancel</a>
        <button class="btn btn--primary" type="submit">
          <i class="fa-solid fa-floppy-disk"></i> Save category
        </button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
